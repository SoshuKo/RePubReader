<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Taswar（分散型SNS）カラベイ・ノード再現サイト" />
  <title>Taswar | Kàlavé Node</title>
  <link rel="icon" type="image/png" href="../assets/images/アイコン.png" />
  <link rel="stylesheet" href="./taswar.css" />
</head>
<body>
  <div class="app">
    <aside class="left">
      <div class="brand">
        <img src="./Taswarのロゴ.png" alt="Taswar" />
        <h1>Taswar</h1>
      </div>
      <nav>
        <button class="nav-btn active" data-tab="timeline">タイムライン</button>
        <button class="nav-btn" data-tab="notifications">通知</button>
        <button class="nav-btn" data-tab="user">ユーザー</button>
        <button class="nav-btn" data-tab="settings">設定</button>
      </nav>
      <div class="node-box">
        <label for="nodeSelect">ノード選択</label>
        <select id="nodeSelect"><option value="kalave" selected>カラベイ・ノード</option></select>
      </div>
    </aside>

    <main class="center">
      <section id="tab-timeline" class="tab active">
        <header class="tab-head"><h2>タイムライン</h2><p id="timeNow"></p></header>

        <details id="composerWrap" class="card composer-wrap" open>
          <summary>投稿する</summary>
          <form id="composer">
            <div class="grid2">
              <label>アイコン文字<input id="uLabel" maxlength="2" placeholder="AB" /></label>
              <label>アイコン色<input id="uColor" type="color" value="#00ffa1" /></label>
              <label>ユーザー名<input id="uName" placeholder="名前" required /></label>
              <label>ID（@付き）<input id="uHandle" placeholder="@your_id" /></label>
            </div>
            <label>プロフィール<textarea id="uProfile" rows="2"></textarea></label>
            <label>本文<textarea id="postText" rows="3" placeholder="いま何してる？" required></textarea></label>
            <label>画像キャプション（任意）<input id="postCaption" placeholder="画像説明だけ表示" /></label>
            <div class="actions"><button type="submit">投稿</button></div>
          </form>
        </details>

        <div id="feed" class="feed"></div>
      </section>

      <section id="tab-notifications" class="tab">
        <header class="tab-head"><h2>通知</h2></header>
        <div class="card"><p>未実装（のちのち特定ワード返信を追加予定）</p></div>
      </section>

      <section id="tab-user" class="tab">
        <header class="tab-head"><h2>ユーザー</h2></header>
        <div id="profileView" class="card"></div>
        <div class="card user-tools">
          <h3>投稿データ管理</h3>
          <div class="actions wrap">
            <label class="file-btn">投稿を読み込む<input id="importJson" type="file" accept="application/json" hidden /></label>
            <button id="exportJson" type="button">投稿を出力</button>
            <button id="templateJson" type="button">.jsonの雛形を出力</button>
            <button id="resetAccount" type="button">アカウントをリセット</button>
          </div>
        </div>
        <div class="card"><h3>投稿一覧</h3><div id="userPosts"></div></div>
        <div class="card"><h3>いいね一覧</h3><div id="userLikes"></div></div>
      </section>

      <section id="tab-settings" class="tab">
        <header class="tab-head"><h2>設定</h2></header>
        <div class="card"><p>メタ設定エリア（隔離）</p><p><a href="../index.html">トップページへ戻る</a></p></div>
      </section>
    </main>
  </div>

  <div id="profileModal" class="modal" hidden>
    <div class="modal-backdrop" data-close="1"></div>
    <div class="modal-panel">
      <button id="modalClose" class="modal-close" type="button">閉じる</button>
      <div id="modalProfile"></div>
      <div id="modalPosts"></div>
    </div>
  </div>
  <script src="./taswar.js"></script>
</body>
</html>
