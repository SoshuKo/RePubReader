    <meta name="description" content="『共和国物語』サーガの登場人物辞典。人物紹介・台詞・関連人物を一覧で閲覧。" />
  <link rel="canonical" href="https://soshuko.github.io/RePubReader/characters.html" />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://soshuko.github.io/RePubReader/characters.html" />
  <meta property="og:title" content="登場人物辞典 | 『共和国物語』サーガ" />
  <meta property="og:description" content="『共和国物語』サーガの登場人物辞典。人物紹介・台詞・関連人物を一覧で閲覧。" />

  <meta name="twitter:description" content="『共和国物語』サーガの登場人物辞典。人物紹介・台詞・関連人物を一覧で閲覧。" />
  <meta name="twitter:image" content="./assets/images/アイコン.png" />
  <title>登場人物辞典 | 『共和国物語』サーガ</title>
  <style>
    :root {
      --bg: #f7f5ef;
      --card: #ffffff;
      --ink: #1a1a1a;
      --muted: #635e54;
      --line: #ddd4c6;
      --accent: #7b1f2b;
      --accent-soft: #f8ecef;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      color: var(--ink);
      background: linear-gradient(155deg, #f5efe2, #f8f6f0);
      font-family: "BIZ UDPGothic", "Yu Gothic UI", sans-serif;
    }
    header {
      position: sticky;
      top: 0;
      z-index: 10;
      background: rgba(255,255,255,.92);
      backdrop-filter: blur(4px);
      border-bottom: 1px solid var(--line);
      padding: 14px clamp(14px, 4vw, 28px);
    }
    h1 { margin: 0 0 8px; font-size: 1.22rem; }
    nav a { color: #16566d; margin-right: 12px; text-decoration: none; border-bottom: 1px dotted currentColor; }
    .lang-switch { margin: 6px 0 4px; font-size: .95rem; }
    .lang-switch a { color: #16566d; text-decoration: none; border-bottom: 1px dotted currentColor; margin-right: 10px; }
    .lang-switch a[aria-current="page"] { font-weight: 700; color: #7b1f2b; border-bottom-style: solid; }
    .tools {
      display: grid;
      grid-template-columns: 1fr 200px;
      gap: 10px;
      margin-top: 10px;
    }
    input, select {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 9px 10px;
      font: inherit;
      background: #fff;
    }
    main {
      width: min(1200px, 96vw);
      margin: 18px auto 42px;
      display: grid;
      gap: 12px;
    }
    .card {
      scroll-margin-top: 120px;
      border: 1px solid var(--line);
      border-radius: 14px;
      background: var(--card);
      overflow: hidden;
      box-shadow: 0 8px 24px rgba(28, 24, 18, .06);
    }
    .head {
      padding: 14px 16px;
      background: var(--accent-soft);
      border-bottom: 1px solid var(--line);
    }
    .entry-art-wrap {
      margin-top: 10px;
      width: min(220px, 42vw);
      border: 0;
      border-radius: 10px;
      overflow: hidden;
      background: transparent;
    }
    .entry-art-wrap.empty { display: none; }
    .entry-art {
      width: 100%;
      height: 120px;
      display: block;
      object-fit: contain;
      filter: drop-shadow(0 2px 6px rgba(0,0,0,.18));
      background: transparent;
    }
    .name { margin: 0 0 6px; font-size: 1.1rem; color: var(--accent); }
    .copy { margin: 0; color: var(--muted); }
    .body {
      padding: 14px 16px;
      display: grid;
      gap: 10px;
      line-height: 1.8;
    }
    .label { font-weight: 700; }
    .quote {
      margin: 0;
      border-left: 4px solid #c9b8a0;
      padding: 6px 10px;
      background: #faf7f1;
      white-space: pre-wrap;
    }
    .chips { display: flex; flex-wrap: wrap; gap: 6px; }
    .chip {
      padding: 4px 8px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: #fff;
      font-size: .88rem;
    }
    a.chip {
      color: inherit;
      text-decoration: none;
    }
    a.chip:hover {
      background: #f5efe2;
    }
    .dim { color: var(--muted); }
  </style>
  <link rel="icon" type="image/png" href="./assets/images/アイコン.png" />
</head>
<body>
  <header>
    <h1>『共和国物語』サーガ 登場人物辞典</h1>
    <nav>
      <a href="./index.html">本編</a>
      <a href="characters.html">登場人物辞典</a>
      <a href="glossary.html">用語辞典</a>
      <a href="audiocommentary.html">オーディオコメンタリ</a>
      <a href="diary.html">執筆録</a>
    
      <a href="./地理/geo.html">世界設定</a>
      <a href="./観光/visit.html">外務省観光局</a>
    </nav>
    <div class="lang-switch"><a id="langLinkJa" href="./characters.html">日本語</a><a id="langLinkEn" href="./characters.html?lang=en">English</a></div>
    <div class="tools">
      <input id="q" type="search" placeholder="名前・肩書き・本文で検索" />
      <select id="sort">
        <option value="story">本編順</option>
        <option value="name">名前順</option>
      </select>
    </div>
  </header>
  <main id="list"></main>

  <script>
    const elList = document.getElementById("list");
    const elQ = document.getElementById("q");
    const elSort = document.getElementById("sort");

    const esc = (s) => String(s ?? "").replace(/[&<>\"]/g, (ch) => ({ "&":"&amp;", "<":"&lt;", ">":"&gt;", "\"":"&quot;" }[ch]));
    const asArray = (v) => Array.isArray(v) ? v : (v ? [v] : []);

    let rows = [];
    let charSlugByName = new Map();
    let imageNameById = new Map();
    const imageOverrideById = new Map([
      ["Sāna", "サーナ"],
      ["Apàla", "アパラ"],
      ["Èshe", "エシェ"],
      ["ヤナン-カウ", "ヤナン・カウ"],
      ["タゲン-アガケイ", "タゲン・アガケイ"],
      ["パジェン-■", "パジェン・■"]
    ]);
    const pageLang = (new URLSearchParams(location.search).get("lang") === "en") ? "en" : "ja";
    document.documentElement.setAttribute("lang", pageLang);
    const ui = pageLang === "en" ? {
      title: "Republica Saga Character Dictionary",
      h1: "Republica Saga Character Dictionary",
      navMain: "Story",
      navChars: "Character Dictionary",
      navGloss: "Glossary",
      navAudio: "Audio Commentary",
      navDiary: "Writing Log",
      navWorld: "World",
      navTour: "Tourism",
      search: "Search by name / title / profile",
      sortStory: "Story order",
      sortName: "Name order",
      noMatch: "No matching characters.",
      loadingErr: "Failed to load: ",
      labels: {
        title: "Name",
        catch: "Catchphrase",
        role: "Title",
        body: "Profile",
        style: "Combat Style",
        quote: "Line",
        comment: "Comment",
        related: "Related"
      },
      empty: "(not set)"
    } : {
      title: "登場人物辞典 | 『共和国物語』サーガ",
      h1: "『共和国物語』サーガ 登場人物辞典",
      navMain: "本編",
      navChars: "登場人物辞典",
      navGloss: "用語辞典",
      navAudio: "オーディオコメンタリ",
      navDiary: "執筆録",
      navWorld: "世界設定",
      navTour: "外務省観光局",
      search: "名前・肩書き・本文で検索",
      sortStory: "本編順",
      sortName: "名前順",
      noMatch: "該当する人物がありません。",
      loadingErr: "読み込み失敗: ",
      labels: {
        title: "人名（見出し）",
        catch: "キャッチフレーズ",
        role: "肩書き",
        body: "本文",
        style: "戦闘スタイル",
        quote: "台詞",
        comment: "コメント",
        related: "関連人物"
      },
      empty: "（未入力）"
    };

    document.title = ui.title;
    const h1 = document.querySelector("header h1"); if (h1) h1.textContent = ui.h1;
    const navLinks = document.querySelectorAll("header nav a");
    if (navLinks.length >= 7) {
      navLinks[0].textContent = ui.navMain;
      navLinks[0].href = pageLang === "en" ? "./index.html?lang=en" : "./index.html";
      navLinks[1].textContent = ui.navChars;
      navLinks[1].href = pageLang === "en" ? "characters.html?lang=en" : "characters.html";
      navLinks[2].textContent = ui.navGloss;
      navLinks[2].href = pageLang === "en" ? "glossary.html?lang=en" : "glossary.html";
      navLinks[3].textContent = ui.navAudio;
      navLinks[4].textContent = ui.navDiary;
      navLinks[5].textContent = ui.navWorld;
      navLinks[6].textContent = ui.navTour;
    }
    if (elQ) elQ.placeholder = ui.search;
    const langLinkJa = document.getElementById("langLinkJa");
    const langLinkEn = document.getElementById("langLinkEn");
    if (langLinkJa) langLinkJa.setAttribute("aria-current", pageLang === "ja" ? "page" : "false");
    if (langLinkEn) langLinkEn.setAttribute("aria-current", pageLang === "en" ? "page" : "false");
    if (elSort && elSort.options.length >= 2) {
      elSort.options[0].textContent = ui.sortStory;
      elSort.options[1].textContent = ui.sortName;
    }

    function normalizeKey(v) {
      return String(v ?? "").trim();
    }

    function baseImageName(v) {
      return String(v ?? "")
        .replace(/\(.*?\)/g, "")
        .replace(/\s+/g, " ")
        .trim();
    }

    function resolveCharacterSlug(name) {
      const key = normalizeKey(name);
      return key ? (charSlugByName.get(key) || null) : null;
    }

    function buildImageNameCandidates(names) {
      const seen = new Set();
      const out = [];
      const add = (v) => {
        const key = normalizeKey(v);
        if (!key || seen.has(key)) return;
        seen.add(key);
        out.push(key);
      };

      for (const raw of asArray(names)) {
        const base = normalizeKey(raw);
        if (!base) continue;
        add(base);

        const parts = base
          .split(/[・･\s　\/／=＝\-‐‑‒–—―ー]+/)
          .map((x) => normalizeKey(x))
          .filter(Boolean);
        for (const p of parts) add(p);
        if (parts.length > 1) add(parts[parts.length - 1]);

        const katakanaChunks = base.match(/[ァ-ヴー]{2,}/g) || [];
        for (const chunk of katakanaChunks) add(chunk);
      }
      return out;
    }

    function renderEntryImage(names, alt) {
      const candidates = buildImageNameCandidates(names);
      if (!candidates.length) return "";
      const exts = ["png", "PNG"];
      const srcList = [];
      for (const name of candidates) {
        const enc = encodeURIComponent(name);
        for (const ext of exts) srcList.push(`./assets/images/${enc}.${ext}`);
      }
      const srcs = srcList.join("|");
      return `<div class="entry-art-wrap"><img class="entry-art" src="${esc(srcList[0])}" alt="${esc(alt || candidates[0])}" loading="lazy" decoding="async" fetchpriority="low" data-srcs="${esc(srcs)}" data-idx="0" onerror="(function(img){var list=(img.dataset.srcs||'').split('|');var idx=Number(img.dataset.idx||0)+1;if(idx<list.length){img.dataset.idx=String(idx);img.src=list[idx];}else{img.style.display='none';if(img.parentElement){img.parentElement.className='entry-art-wrap empty';}}})(this)"></div>`;
    }

    function matchText(row, q) {
      if (!q) return true;
      const hay = [
        row.ref.canonical,
        row.entry?.["キャッチフレーズ"],
        row.entry?.["台詞"],
        row.entry?.["肩書き"],
        row.entry?.["本文"],
        row.entry?.["戦闘スタイル"],
        row.entry?.["コメント"],
        asArray(row.entry?.["関連人物"]).join(" ")
      ].join("\n").toLowerCase();
      return hay.includes(q.toLowerCase());
    }

    function pickEntryValue(entry, keys, fallback = "") {
      for (const k of keys) {
        const v = entry && entry[k];
        if (v !== undefined && v !== null && String(v).trim() !== "") return v;
      }
      return fallback;
    }

    function render() {
      const q = elQ.value.trim();
      let view = rows.filter(r => matchText(r, q));

      if (elSort.value === "name") {
        view = [...view].sort((a, b) => a.ref.canonical.localeCompare(b.ref.canonical, "ja"));
      }

      if (view.length === 0) {
        elList.innerHTML = `<p class="dim">${esc(ui.noMatch)}</p>`;
        return;
      }

      elList.innerHTML = view.map((row) => {
        const e = row.entry || {};
        const title = pickEntryValue(e, [ui.labels.title, "人名（見出し）", "Name", "name", "title"], row.ref.canonical);
        const catchCopy = pickEntryValue(e, [ui.labels.catch, "キャッチフレーズ", "Catchphrase", "catch", "tagline"], ui.empty);
        const related = asArray(pickEntryValue(e, [ui.labels.related, "関連人物", "Related", "related", "related_characters"], []));
        const relatedHtml = related.map((x) => {
          const slug = resolveCharacterSlug(x);
          if (!slug) return `<span class="chip">${esc(x)}</span>`;
          return `<a class="chip" href="#${encodeURIComponent(slug)}">${esc(x)}</a>`;
        }).join("");

        return `
          <section class="card" id="${esc(row.ref.slug)}" data-name="${esc(title)}" data-canonical="${esc(row.ref.canonical || "")}">
            <div class="head">
              <h2 class="name">${esc(title)}</h2>
              <p class="copy">${esc(catchCopy)}</p>
              ${renderEntryImage([
                imageOverrideById.get(normalizeKey(row.ref.slug)),
                imageOverrideById.get(normalizeKey(e.id)),
                imageNameById.get(normalizeKey(row.ref.slug)),
                imageNameById.get(normalizeKey(e.id)),
                imageNameById.get(normalizeKey(title)),
                baseImageName(String(e.id || "").replace(/-/g, "・")),
                baseImageName(String(title || "").replace(/[（(].*?[）)]/g, "").replace(/-/g, "・")),
                baseImageName(title)
              ], `${title} illustration`)}
            </div>
            <div class="body">
              <div><span class="label">${esc(ui.labels.role)}:</span> ${esc(pickEntryValue(e, [ui.labels.role, "肩書き", "Title", "role", "title"], ui.empty))}</div>
              <div><span class="label">${esc(ui.labels.body)}:</span> ${esc(pickEntryValue(e, [ui.labels.body, "本文", "Profile", "body"], ui.empty))}</div>
              <div><span class="label">${esc(ui.labels.style)}:</span> ${esc(pickEntryValue(e, [ui.labels.style, "戦闘スタイル", "Combat Style", "style", "combat_style"], ui.empty))}</div>
              <div><span class="label">${esc(ui.labels.quote)}:</span></div>
              <blockquote class="quote">${esc(pickEntryValue(e, [ui.labels.quote, "台詞", "Line", "quote"], ui.empty))}</blockquote>
              <div><span class="label">${esc(ui.labels.comment)}:</span> ${esc(pickEntryValue(e, [ui.labels.comment, "コメント", "Comment", "comment"], ui.empty))}</div>
              <div>
                <span class="label">${esc(ui.labels.related)}:</span>
                ${related.length ? `<div class="chips">${relatedHtml}</div>` : ui.empty}
              </div>
            </div>
          </section>
        `;
      }).join("\n");
    }

    function jumpToHash() {
      const raw = (location.hash || "").replace(/^#/, "");
      if (!raw) return;
      const id = decodeURIComponent(raw);
      const needle = normalizeKey(id);

      let target = document.getElementById(id);
      if (!target) {
        target = [...document.querySelectorAll(".card")].find((el) => {
          const idKey = normalizeKey(el.id);
          const nameKey = normalizeKey(el.dataset.name || "");
          const canonicalKey = normalizeKey(el.dataset.canonical || "");
          return idKey === needle || nameKey === needle || canonicalKey === needle;
        }) || null;
      }

      if (target) {
        target.scrollIntoView({ block: "start" });
        setTimeout(() => window.scrollBy(0, -14), 0);
      }
    }

    async function boot() {
      try {
        function loadJsonByXhr(url) {
          try {
            const xhr = new XMLHttpRequest();
            xhr.open("GET", url, false);
            xhr.send(null);
            if (xhr.status === 200 || xhr.status === 0) {
              return JSON.parse(xhr.responseText);
            }
          } catch (_) {}
          return null;
        }

        async function fetchJson(primary, fallback = null) {
          try {
            const res = await fetch(primary, { cache: "no-store" });
            if (res.ok) return await res.json();
          } catch (_) {}

          const byXhr = loadJsonByXhr(primary);
          if (byXhr) return byXhr;

          if (fallback) {
            try {
              const res2 = await fetch(fallback, { cache: "no-store" });
              if (res2.ok) return await res2.json();
            } catch (_) {}

            const byXhr2 = loadJsonByXhr(fallback);
            if (byXhr2) return byXhr2;
          }
          throw new Error(`load failed: ${primary}${location.protocol === "file:" ? " (open via local server: http://localhost)" : ""}`);
        }

        let story = null;
        try {
          story = await fetchJson(
            pageLang === "en" ? "./data/story_en.json" : "./data/物語本編.json",
            "./data/物語本編.json"
          );
        } catch (_) {}

        const dic = await fetchJson(
          pageLang === "en" ? "./data/rpdic_en.json" : "./data/rpdic.json",
          "./data/rpdic.json"
        );

        let refs = (story && story.references && Array.isArray(story.references.characters))
          ? story.references.characters
          : [];

        charSlugByName = new Map();
        for (const ref of refs) {
          const slug = ref.slug;
          for (const name of [ref.canonical, ...(ref.aliases || [])]) {
            const key = normalizeKey(name);
            if (key && slug && !charSlugByName.has(key)) {
              charSlugByName.set(key, slug);
            }
          }
        }



        imageNameById = new Map();
        if (pageLang === "en") {
          try {
            const dicJa = await fetchJson("./data/rpdic.json", null);
            for (const cja of ((dicJa.characters || []) || [])) {
              if (cja && cja.id && cja["人名（見出し）"]) {
                imageNameById.set(String(cja.id).trim(), cja["人名（見出し）"]);
              }
            }
          } catch (_) {}
        }

        const map = new Map();
        for (const c of ((dic.characters || dic.characters_en || []) || [])) {
          const kId = c.id || c.slug || c.key;
          const kJa = c["人名（見出し）"] || c["名前"];
          const kEn = c["Name"] || c.name || c.title;
          if (kId) map.set(normalizeKey(kId), c);
          if (kJa) map.set(normalizeKey(kJa), c);
          if (kEn) map.set(normalizeKey(kEn), c);
        }

        if (!refs.length) {
          const fromDic = (dic.characters || dic.characters_en || []);
          refs = fromDic.map((c, idx) => {
            const canonical = c["人名（見出し）"] || c["Name"] || c.title || c.name || `Entry ${idx + 1}`;
            const slugRaw = c.id || canonical || `char-${idx + 1}`;
            const slug = String(slugRaw).trim().replace(/\s+/g, "-");
            return { slug, canonical, aliases: [] };
          });
        }

        rows = refs.map(ref => ({
          ref,
          entry: map.get(normalizeKey(ref.slug)) || map.get(normalizeKey(ref.canonical)) || map.get(baseImageName(ref.canonical)) || null
        }));

        render();
        jumpToHash();
      } catch (e) {
        elList.innerHTML = `<p class="dim">${esc(ui.loadingErr)}${esc(e.message)}</p>`;
      }
    }

    elQ.addEventListener("input", render);
    elSort.addEventListener("change", render);

    window.addEventListener('hashchange', () => setTimeout(jumpToHash, 0));
    boot();
  </script>
<script id="autoLangEnPatch">
(function(){
  const p = new URLSearchParams(location.search);
  if (p.get("lang") !== "en") return;
  document.querySelectorAll('a[href]').forEach(a => {
    if (a.closest('.lang-switch') || a.closest('.lang-buttons') || (a.id && (/^langLink/i.test(a.id) || /^lang-/i.test(a.id)))) return;
    const h = a.getAttribute("href");
    if (!h || h.startsWith("#") || h.startsWith("http://") || h.startsWith("https://") || h.startsWith("mailto:") || h.startsWith("tel:")) return;
    if (h.includes("lang=")) return;
    const i = h.indexOf("#");
    const base = i >= 0 ? h.slice(0, i) : h;
    const hash = i >= 0 ? h.slice(i) : "";
    const sep = base.includes("?") ? "&" : "?";
    a.setAttribute("href", base + sep + "lang=en" + hash);
  });
})();
</script>
</body>
</html>
