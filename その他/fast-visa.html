    .wrap{max-width:940px;margin:0 auto;padding:20px}

  <div class="wrap">

  <script>
    const params=new URLSearchParams(location.search);
    const purpose=params.get('purpose')||'Muabe موب（選択）';
    const note=params.get('note')||'';
    document.getElementById('purposeOut').textContent=purpose;
    document.getElementById('noteOut').textContent=note||'（記載なし）';

    const comments=[
      'FM. Shàun Mia شون مي: 許可する。だが、頼むから騒ぎだけは起こさないでくれ。タネイ猊下は面白がっているが、尻拭いをするのは我々事務方なのだ。',
      'FM. Shàun Mia شون مي: 許可する、が。『西アルトス研究会』？『奪還作戦一行』？ なんだそれは。新しい劇団か何かか？ 申告内容の意味が不明だが、危害を加える意思はなさそうだ。',
      'FM. Shàun Mia شون مي: 許可する。成功を祈る。もし失敗したら、私の胃に穴が開く前に、君たちが国境警察のご厄介になるだろう。'
    ];
    document.getElementById('staffComment').textContent=comments[Math.floor(Math.random()*comments.length)];
  </script>
