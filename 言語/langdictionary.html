  <style>
    :root {
      --bg: #fff8ee;
      --card: #ffffff;
      --ink: #2a1d11;
      --muted: #7b6148;
      --line: #f5c487;
      --accent: #f09000;
      --accent-soft: #fff1dc;
      --accent-deep: #b15f00;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      color: var(--ink);
      background:
        radial-gradient(circle at 110% -15%, #ffd7a1 0, transparent 45%),
        radial-gradient(circle at -10% 110%, #ffe7c7 0, transparent 42%),
        var(--bg);
      font-family: "BIZ UDPGothic", "Yu Gothic UI", sans-serif;
    }
    .layout {
      display: grid;
      grid-template-columns: 300px 1fr;
      min-height: 100vh;
    }
    aside {
      border-right: 1px solid var(--line);
      padding: 16px;
      background: linear-gradient(180deg, #fff9ef, #ffeed6);
      position: sticky;
      top: 0;
      height: 100vh;
      overflow: auto;
    }
    main {
      min-width: 0;
      padding: 18px clamp(14px, 2.6vw, 34px) 28px;
    }
    h1 {
      margin: 0 0 8px;
      font-size: 1.14rem;
      letter-spacing: .04em;
      color: var(--accent-deep);
    }
    .meta {
      margin: 0 0 12px;
      color: var(--muted);
      font-size: .86rem;
      line-height: 1.6;
    }
    nav a {
      display: inline-block;
      margin: 0 10px 8px 0;
      color: #8a4d00;
      text-decoration: none;
      border-bottom: 1px dotted currentColor;
    }
    .tools {
      margin-top: 10px;
      display: grid;
      gap: 8px;
    }
    input, select {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 9px 10px;
      font: inherit;
      background: #fff;
      color: var(--ink);
    }
    .stats {
      margin-top: 10px;
      font-size: .86rem;
      color: var(--muted);
    }
    .hero {
      border: 1px solid var(--line);
      border-radius: 14px;
      background: linear-gradient(160deg, #fff9ee, #ffe9c7);
      padding: 14px;
      margin-bottom: 12px;
    }
    .hero h2 {
      margin: 0 0 6px;
      color: var(--accent-deep);
      font-size: 1.15rem;
    }
    .hero p {
      margin: 0;
      color: #754f2b;
      line-height: 1.8;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 10px;
    }
    .card {
      border: 1px solid var(--line);
      border-radius: 14px;
      background: var(--card);

<body>
  <div class="layout">
    <aside>
      <h1>カラバル語オンライン辞書</h1>
      <p class="meta">#F09000基調 / 架空国家カラベイ教導国 言語資料</p>
      <nav>
        <a href="../index.html">トップ・本編</a>
        <a href="../characters.html">登場人物辞典</a>
        <a href="../glossary.html">用語辞典</a>
        <a href="../audiocommentary.html">オーディオコメンタリ</a>
        <a href="../diary.html">執筆録</a>
        <a href="../地理/geo.html">世界設定</a>
        <a href="./karabar-overview.html">カラバル語概要</a>
      </nav>

      <div class="tools">
        <input id="q" type="search" placeholder="単語・語根・IPA・補足で検索" />
        <select id="field">
          <option value="all">全項目</option>
          <option value="日本語">日本語</option>
          <option value="カラバル語">カラバル語</option>
          <option value="IPA">IPA</option>
          <option value="アラビア文字">アラビア文字</option>
          <option value="語根">語根</option>
          <option value="語根+接辞">語根+接辞</option>
          <option value="補足">補足</option>
        </select>
      </div>
      <div id="stats" class="stats">読み込み中...</div>
    </aside>

    <main>
      <section class="hero">
        <h2>Lexicon Archive</h2>
        <p>カラバル語の語彙、語根、IPA、アラビア文字表記を横断検索できます。架空世界「カラベイ教導国」の言語設定資料として利用できます。</p>
      </section>
      <section id="list" class="grid"></section>
    </main>
  </div>

  <script>
    const listEl = document.getElementById('list');
    const qEl = document.getElementById('q');
    const fieldEl = document.getElementById('field');
    const statsEl = document.getElementById('stats');
    let rows = [];

    function esc(v) {
      const d = document.createElement('div');
      d.textContent = String(v ?? '');
      return d.innerHTML;
    }

    function asText(v) {
      return String(v ?? '').trim();
    }

    function matchRow(row, q, field) {
      if (!q) return true;
      const needle = q.toLowerCase();
      if (field !== 'all') {
        return asText(row[field]).toLowerCase().includes(needle);
      }
      const all = [
        row['日本語'], row['カラバル語'], row['IPA'], row['アラビア文字'],
        row['語根'], row['語根+接辞'], row['同音異義語説明'], row['同音異義語+接辞'], row['補足']
      ].map(asText).join('\n').toLowerCase();
      return all.includes(needle);
    }

    function draw() {
      const q = qEl.value.trim();
      const field = fieldEl.value;
      const filtered = rows.filter((r) => matchRow(r, q, field));
      statsEl.textContent = '表示件数: ' + filtered.length + ' / 全' + rows.length + '件';

      if (filtered.length === 0) {
        listEl.innerHTML = '<div class="empty">該当する語彙がありません。</div>';
        return;
      }

      listEl.innerHTML = filtered.map((row) => {
        const jp = asText(row['日本語']) || '未設定';
        const karabar = asText(row['カラバル語']) || '-';
        const ipa = asText(row['IPA']) || '-';
        const arab = asText(row['アラビア文字']) || '-';
        const root = asText(row['語根']) || '-';
        const affix = asText(row['語根+接辞']) || '-';
        const homo = asText(row['同音異義語説明']) || '-';
        const homoAffix = asText(row['同音異義語+接辞']) || '-';
        const note = asText(row['補足']) || '-';

        return ''
          + '<article class="card">'
          +   '<div class="head">'
          +     '<h3 class="jp">' + esc(jp) + '</h3>'
          +     '<p class="kv">' + esc(karabar) + '</p>'
          +   '</div>'
          +   '<div class="body">'
          +     '<div><span class="label">IPA</span>' + esc(ipa) + '</div>'
          +     '<div><span class="label">アラビア文字</span>' + esc(arab) + '</div>'
          +     '<div><span class="label">語根</span>' + esc(root) + '</div>'
          +     '<div><span class="label">語根+接辞</span>' + esc(affix) + '</div>'
          +     '<div><span class="label">同音異義語説明</span>' + esc(homo) + '</div>'
          +     '<div><span class="label">同音異義語+接辞</span>' + esc(homoAffix) + '</div>'
          +     '<div><span class="label">補足</span>' + esc(note) + '</div>'
          +   '</div>'
          + '</article>';
      }).join('');
    }

    async function boot() {
      try {
        const res = await fetch('./lexicon/lexicon.json', { cache: 'no-store' });
        if (!res.ok) throw new Error('HTTP ' + res.status);
        const json = await res.json();
        rows = Array.isArray(json) ? json.slice() : [];
        rows.sort((a, b) => asText(a['カラバル語']).localeCompare(asText(b['カラバル語']), 'ja'));
        draw();
      } catch (e) {
        listEl.innerHTML = '<div class="empty">読み込み失敗: ' + esc(e.message) + '</div>';
        statsEl.textContent = '読み込み失敗';
      }
    }

    qEl.addEventListener('input', draw);
    fieldEl.addEventListener('change', draw);
    boot();
  </script>
</body>
