  <style>

<body>
  <div class="layout">
    <aside>
      <h1>カラバル語 文法総覧</h1>
      <p class="meta">章立てで読む文法まとめ（JSON整形版）</p>
      <nav>
        <a href="../index.html">トップ・本編</a>
        <a href="../characters.html">登場人物辞典</a>

        <a href="./karabar-overview.html">概要・講義</a>
        <a href="./langdictionary.html">カラバル語辞書</a>
      </nav>
    </aside>

    <main>
      <section class="card">
        <h2 id="page-title">カラバル語 文法総覧</h2>
        <div class="body">
          <p id="lead" class="lead">読み込み中...</p>
        </div>
      </section>

      <div id="content"></div>
    </main>
  </div>

  <script>
    const content = document.getElementById('content');
    const esc = (s) => String(s ?? '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    const toList = (arr) => `<ul>${(arr || []).map(x => `<li>${esc(x.ja || x)}</li>`).join('')}</ul>`;

    function section(title, html) {
      return `<section class="card"><h2>${esc(title)}</h2><div class="body">${html}</div></section>`;
    }

    function table(headers, rows) {
      const head = `<tr>${headers.map(h => `<th>${esc(h)}</th>`).join('')}</tr>`;
      const body = rows.map(r => `<tr>${r.map(c => `<td>${c}</td>`).join('')}</tr>`).join('');
      return `<table><thead>${head}</thead><tbody>${body}</tbody></table>`;
    }

    function chips(items) {
      return `<div class="chips">${(items || []).map(v => `<span class="chip">${esc(v)}</span>`).join('')}</div>`;
    }

    function renderPhonology(p) {
      const consonantLabels = {
        nasals: '鼻音',
        stops: '破裂音',
        affricates: '破擦音',
        fricatives: '摩擦音',
        trills: 'ふるえ音',
        approximants: '接近音',
        lateral_approximants: '側面接近音'
      };
      const consonantRows = Object.entries(p.consonants || {}).map(([k, v]) => [esc(consonantLabels[k] || k), esc(v)]);
      const toneRows = (p.tones || []).map(t => [esc(t.mark === 'none' ? 'なし' : t.mark), esc(t.pattern)]);
      const notes = (p.notes || []).map(n => `<li>${esc(n.ja || n)}</li>`).join('');

      return section('音韻論',
        `<h3>子音</h3>
         ${table(['区分', '音価・表記'], consonantRows)}
         <h3>母音</h3>
         ${table(['区分', '音価・表記'], [
           ['主母音', esc(p.vowels?.main || '')],
           ['副母音', esc(p.vowels?.semivowels || '')]
         ])}
         <h3>声調</h3>
         ${table(['記号', 'パターン'], toneRows)}
         <h3>備考</h3>
         <ul>${notes}</ul>`
      );
    }

    function renderMorphology(m) {
      const cls = m.noun_classes || {};
      const conversionRows = (m.class_conversion_patterns || []).map(x => [
        esc(x.pattern),
        chips(x.forms || []),
        esc(x.note || '—')
      ]);
      const caseRows = (m.cases || []).map(c => [
        esc(c.ja),
        esc(c.meaning),
        esc(c.singular),
        esc(c.plural)
      ]);

      const verbal = m.verbal_morphology || {};
      const vmRows = [
        ['肯定文（語根が母音語尾）', verbal.affirmative_vowel_final || ''],
        ['肯定文（語根が子音語尾）', verbal.affirmative_consonant_final || ''],
        ['否定文（語根が母音語尾）', verbal.negative_vowel_final || ''],
        ['否定文（語根が子音語尾）', verbal.negative_consonant_final || '']
      ].map(r => [esc(r[0]), esc(r[1])]);
      const vmExampleRows = (verbal.examples || []).map(e => [esc(e.form), esc(e.analysis)]);

      const aspectRows = Object.entries(m.aspect || {}).map(([k, v]) => [esc(k), esc(v)]);
      const tenseRows = Object.entries(m.tense_mood || {}).map(([k, v]) => [esc(k === 'none' ? 'なし' : k), esc(v)]);

      const comp = m.comparison || {};
      const compNotes = (comp.notes || []).map(n => `<li>${esc(n.ja || n)}</li>`).join('');
      const markerRows = (comp.superlative?.markers || []).map(x => [esc(x.marker), esc(x.ja)]);

      const ad = m.adpositions || {};
      const setRows = (ad.setting_particles || []).map(x => [esc(x.ja), esc(x.form), esc(x.example)]);
      const postRows = (ad.postpositions || []).map(x => [esc(x.ja), esc(x.form), esc(x.example)]);
      const arRows = (m.arabic_transliteration || []).map(x => [esc(x.latin), esc(x.arabic)]);

      return section('形態論',
        `<h3>名詞クラス母音</h3>
         ${table(['クラス', '母音'], [
           ['男性', chips(cls.masculine_vowels || [])],
           ['女性I', chips(cls.feminine_i_vowels || [])],
           ['女性II', chips(cls.feminine_ii_vowels || [])],
           ['中性', chips(cls.neuter_vowels || [])]
         ])}

         <h3>クラス転換</h3>
         ${table(['型', '対応母音', '注記'], conversionRows)}
         ${toList(m.notes || [])}

         <h3>格変化</h3>
         ${table(['格', '意味', '単数', '複数'], caseRows)}
         <p><strong>姓名規則:</strong> ${esc(m.name_rule || '')}</p>

         <h3>動詞語根（V）</h3>
         <p>${esc(m.verb_root || '')}</p>

         <h3>動詞の形態素</h3>
         ${table(['種別', '形式'], vmRows)}
         ${table(['例', '分析'], vmExampleRows)}

         <h3>相</h3>
         ${table(['形', '機能'], aspectRows)}

         <h3>時制・法</h3>
         ${table(['形', '機能'], tenseRows)}

         <h3>副詞の作り方</h3>
         <p>${esc(m.adverb_formation?.example || '')}</p>
         <p>${esc(m.adverb_formation?.note || '')}</p>

         <h3>比較級・最上級</h3>
         <ul>${compNotes}</ul>
         ${table(['区分', '形式', '例文', '訳'], [
           ['比較級（形容詞）', esc(comp.comparative?.adjective_example?.form || ''), esc(comp.comparative?.adjective_example?.sentence || ''), esc(comp.comparative?.adjective_example?.translation || '')],
           ['比較級（副詞）', esc(comp.comparative?.adverb_example?.form || ''), esc(comp.comparative?.adverb_example?.sentence || ''), esc(comp.comparative?.adverb_example?.translation || '')],
           ['最上級（形容詞）', esc(comp.superlative?.adjective_example?.form || ''), esc(comp.superlative?.adjective_example?.sentence || ''), esc(comp.superlative?.adjective_example?.translation || '')],
           ['最上級（副詞）', esc(comp.superlative?.adverb_example?.form || ''), esc(comp.superlative?.adverb_example?.sentence || ''), esc(comp.superlative?.adverb_example?.translation || '')]
         ])}
         ${table(['マーカー', '意味'], markerRows)}

         <h3>設置詞</h3>
         ${table(['意味', '形', '例'], setRows)}

         <h3>後置詞</h3>
         ${table(['意味', '形', '例'], postRows)}

         <h3>アラビア文字転写</h3>
         <details><summary>転写一覧を開く</summary>${table(['ラテン表記', 'アラビア文字'], arRows)}</details>`
      );
    }

    function renderSimpleTables(data) {
      const prefixRows = (data.prefixes || []).map(x => [esc(x.form), esc(x.ja || '')]);
      const suffixRows = (data.suffixes || []).map(x => [esc(x.form), esc(x.ja || '')]);
      const suffixERows = (data.suffixes_removing_prev_e || []).map(x => [esc(x.form), esc(x.ja || '')]);
      const auxRows = (data.auxiliary_adverbs || []).map(x => [esc(x.form), esc(x.ja || '')]);
      const postRows = (data.additional_postpositions || []).map(x => [esc(x.ja), esc(x.pattern), esc(x.form)]);
      const conjRows = (data.additional_conjunctions || []).map(x => [esc(x.form), esc(x.ja)]);

      const a = data.conjunction_a || {};
      const aRows = (a.examples || []).map(x => [esc(x.form), esc(x.ja)]);

      const vr = data.class_articles_vr || {};
      const vrRows = (vr.class_assignments || []).map(x => [esc(x.article), esc(x.class), esc(x.ja), esc(x.example || '—')]);
      const toneRows = (vr.tone_distinctions || []).map(x => [esc(x.form), esc(x.example || '—')]);

      const convRows = (data.conversation_expressions || []).map(x => [esc(x.japanese), esc(x.karabar), esc(x.literal_ja || '—')]);

      const loan = data.loanword_rules || {};
      const newLetterRows = (loan.new_letters || []).map(x => [esc(x.letter), esc(x.target), esc(x.value), esc(x.purpose_ja || '')]);
      const phonoRows = (loan.phonological_rules || []).map(x => [esc(x.name), esc(x.description_ja), esc(x.example || '—')]);

      const exonymRows = (data.exonyms || []).map(x => [esc(x.romanized), esc(x.japanese)]);
      const properRows = (data.proper_nouns || []).map(x => [esc(x.japanese), esc(x.romanized), esc(x.ipa || '—'), esc(x.notes || '—')]);

      return [
        section('接辞', table(['接頭辞', '意味'], prefixRows)),
        section('接尾辞', table(['接尾辞', '意味'], suffixRows)),
        section('前の e / é を取り除く接尾辞', table(['接尾辞', '意味'], suffixERows)),
        section('助動詞的副詞', table(['形', '意味'], auxRows)),
        section('数詞',
          `<p>${esc(data.numerals?.formation_over_11?.ja || '')}</p>
           <p>${esc(data.numerals?.ordinals?.ja || '')}</p>`),
        section('追加後置詞', table(['意味', '接続形', '後置詞'], postRows)),
        section('追加接続詞', table(['接続詞', '意味'], conjRows)),
        section('接続詞 a の用法',
          `<p><strong>目的:</strong> ${esc(a.purpose_ja || '')}</p>
           <p><strong>効果:</strong> ${esc(a.effect_ja || '')}</p>
           <p><strong>用法:</strong> ${esc(a.usage_ja || '')}</p>
           ${table(['例', '意味'], aRows)}`),
        section('冠詞 vr 方式',
          `<p>${esc(vr.summary_ja || '')}</p>
           <p><strong>目的:</strong> ${esc(vr.purpose_ja || '')}</p>
           ${table(['冠詞', 'クラス', '説明', '例'], vrRows)}
           <p>${esc(vr.case_rule?.ja || '')}</p>
           ${table(['形', '例'], toneRows)}`),
        section('会話表現', table(['日本語', 'カラバル語', '直訳'], convRows)),
        section('借用語処理ルール',
          `<h3>${esc(loan.vowel_transcription?.rule_title_ja || '母音の転写')}</h3>
           <p>${esc(loan.vowel_transcription?.summary_ja || '')}</p>
           ${table(['文字', '対象', '音価', '目的'], newLetterRows)}
           ${table(['規則', '説明', '例'], phonoRows)}`),
        section('外名（エクソニム）', table(['ローマナイズ', '日本語表記'], exonymRows)),
        section('固有名詞一覧', `<details><summary>固有名詞一覧を開く（${properRows.length}件）</summary>${table(['日本語', 'ローマナイズ', 'IPA', '備考'], properRows)}</details>`),
        section('注記', toList(data.notes || []))
      ].join('');
    }

    async function init() {
      try {
        const res = await fetch('./karabar_grammar.json', { cache: 'no-store' });
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const data = await res.json();

        document.getElementById('page-title').textContent = data.title_ja || 'カラバル語 文法総覧';
        document.getElementById('lead').textContent = 'JSONを章立ての文法記事に再構成したページです。';

        content.innerHTML = [
          renderPhonology(data.phonology || {}),
          renderMorphology(data.morphology || {}),
          renderSimpleTables(data)
        ].join('');
      } catch (e) {
        content.innerHTML = section('読み込みエラー', `<p class="error">karabar_grammar.json の読み込みに失敗しました: ${esc(e.message)}</p>`);
      }
    }

    init();
  </script>
</body>
