<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RePuniS</title>
  <link rel="stylesheet" href="./RePuniS.css" />
</head>
<body>
  <div id="startScreen" aria-label="ゲームトップ画面">
    <div class="start-backdrop"></div>
    <section class="start-card">
      <img id="startLogo" src="./image/ロゴ.png" alt="RePuniS ロゴ" />
      <h1>RePuniS</h1>
      

      <div class="mode-tabs" role="tablist" aria-label="モード選択">
        <button id="modePlayBtn" class="mode-tab active" type="button" data-mode="play">プレイモード</button>
        <button id="modeStadiumBtn" class="mode-tab" type="button" data-mode="stadium">スタジアムモード</button>
      </div>

      <div id="stadiumSetup" class="stadium-setup" hidden>
        <div class="slot-card">
          <div class="slot-title">1P</div>
          <img id="selfCharPreview" class="slot-preview" alt="1Pキャラ" />
          <label>キャラクター
            <select id="selfCharSelect"></select>
          </label>
          <label>ナイフ
            <select id="stadiumKnifeSelect"></select>
          </label>
        </div>

        <div class="slot-card">
          <div class="slot-title">2P</div>
          <img id="enemyCharPreview" class="slot-preview" alt="2Pキャラ" />
          <label>キャラクター
            <select id="enemyCharSelect"></select>
          </label>
          <label>ナイフ
            <select id="stadiumKnife2Select"></select>
          </label>
        </div>
      </div>

      <button id="startGameBtn" class="start-game-btn" type="button">ゲームスタート</button>
    </section>
  </div>

  <div id="app">
    <aside id="sidebar">
      <h1>ぷに選択</h1>
      <div class="help">キャラ本体を掴んでドラッグ。</div>
      <div id="charList"></div>
    </aside>

    <main id="gameWrap">
      <canvas id="gameCanvas"></canvas>
      <button id="navLeft" class="stage-nav" type="button" aria-label="左ステージへ">◀</button>
      <button id="navRight" class="stage-nav" type="button" aria-label="右ステージへ">▶</button>
      <div id="hud">読み込み中...</div>

      <div id="mobileToggles">
        <button id="toggleLeftSidebar" class="mobile-toggle-btn" type="button">キャラ</button>
        <button id="toggleRightSidebar" class="mobile-toggle-btn" type="button">情報</button>
      </div>

      <section id="mobileActionOverlay" aria-label="モバイル操作パネル">
        <div class="panel-title">操作</div>
        <div class="action-grid">
          <button class="action-btn action-trigger" data-action="bounce" type="button">はねる</button>
          <button class="action-btn action-trigger" data-action="roll" type="button">転がる</button>
          <button class="action-btn action-trigger" data-action="pickup" type="button">拾う/捨てる</button>
        </div>
        <div class="panel-title">セリフログ</div>
        <div id="speechLogMobile" class="speech-log"></div>
      </section>
    </main>

    <aside id="entityPanel" aria-label="現在ステージのオブジェクト">
      <button id="combatHelpBtn" class="icon-help-btn" type="button" aria-label="操作説明" aria-expanded="false">?</button>
      <section id="combatHelpBox" class="combat-help-box" hidden>
        <div class="panel-title">操作説明</div>
        <div class="help-lines">
          <div>ナイフを持っているときのみ攻撃ができます。</div>
          <div>はねる：通常攻撃</div>
          <div>前転がる：前転回避攻撃（無敵時間あり）</div>
          <div>後ろ転がる：後方回避（無敵時間あり）</div>
          <div>捨てる：投擲攻撃</div>
          <div>はねる→前転がる：降下斬り</div>
          <div>後ろ転がる→前はねる：ジャストガード</div>
          <div>前転がる→前はねる：居合い斬り</div>
        </div>
        <button id="combatHelpClose" class="help-close-btn" type="button">閉じる</button>
      </section>
      <div id="stageSelectSection">
        <div class="panel-title">ステージ選択</div>
        <select id="stageSelector" aria-label="ステージ選択"></select>
      </div>

      <div id="entitySection">
        <div id="entityCountTitle" class="panel-title">現在ステージのキャラ/アイテム (0)</div>
        <div id="entityList"></div>
      </div>

      <div class="desktop-only" id="actionSection">
        <div class="panel-title">操作</div>
        <div class="action-grid">
          <button class="action-btn action-trigger" data-action="bounce" type="button">はねる</button>
          <button class="action-btn action-trigger" data-action="roll" type="button">転がる</button>
          <button class="action-btn action-trigger" data-action="pickup" type="button">拾う/捨てる</button>
        </div>
      </div>

      <div class="desktop-only" id="speechSection">
        <div class="panel-title">セリフログ</div>
        <div id="speechLogDesktop" class="speech-log"></div>
      </div>
    </aside>
  </div>

  <script src="./RePuniS_config.js"></script>
  <script src="./RePuniS.js"></script>
</body>
</html>
