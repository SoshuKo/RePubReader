  <script>
  (function(){
    const key='tourism_sidebar_hidden';
    const b=document.body;
    const closeBtn=document.getElementById('closeBtn');
    const openBtn=document.getElementById('openBtn');
    function apply(){
      const mobile = window.matchMedia('(max-width:960px)').matches;
      if(mobile){ b.classList.remove('sidebar-hidden'); }
      else if(localStorage.getItem(key)==='1'){ b.classList.add('sidebar-hidden'); }
      else { b.classList.remove('sidebar-hidden'); }
    }
    closeBtn?.addEventListener('click',()=>{
      const mobile = window.matchMedia('(max-width:960px)').matches;
      if(mobile){ b.classList.remove('sidebar-open'); }
      else { b.classList.add('sidebar-hidden'); localStorage.setItem(key,'1'); }
    });
    openBtn?.addEventListener('click',()=>{
      const mobile = window.matchMedia('(max-width:960px)').matches;
      if(mobile){ b.classList.add('sidebar-open'); }
      else { b.classList.remove('sidebar-hidden'); localStorage.setItem(key,'0'); }
    });
    window.addEventListener('resize',apply);
    apply();
  })();

  const SOURCES = [
    { id:'politics', label:'政治', txt:'./政治.txt' },
    { id:'religion', label:'宗教', txt:'./宗教txt.txt' },
    { id:'culture', label:'文化', txt:'./文化.txt' },
    { id:'geography', label:'地理', txt:'./地理.txt' }
  ];

  const switcher = document.getElementById('switcher');
  const docTitle = document.getElementById('docTitle');
  const docBody = document.getElementById('docBody');

  function esc(s){
    return String(s ?? '').replace(/[&<>\"]/g, (ch)=>({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;' }[ch]));
  }

  function normalizeTableRows(rows){
    const cleaned = (rows || []).map(r => (r || []).map(v => String(v ?? '').trim())).filter(r => r.some(Boolean));
    if (!cleaned.length) return [];

    const lengths = cleaned.map(r => r.length).filter(n => n > 0);
    const freq = new Map();
    for (const n of lengths) freq.set(n, (freq.get(n) || 0) + 1);

    let target = cleaned[0].length;
    let bestCount = -1;
    for (const [n, c] of freq.entries()) {
      if (c > bestCount || (c === bestCount && n > target)) {
        target = n;
        bestCount = c;
      }
    }
    target = Math.max(target || 0, cleaned[0].length || 0, 2);

    return cleaned.map((row, idx) => {
      const r = row.slice();
      const desired = idx === 0 ? Math.max(target, r.length) : target;
      if (r.length > desired) {
        const keep = r.slice(0, desired - 1);
        keep.push(r.slice(desired - 1).join(' / '));
        return keep;
      }
      while (r.length < desired) r.push('');
      return r;
    });
  }

      function toHtmlFromTxt(text, opt = {}){
    const lines = String(text || '').replace(/\r/g,'').split('\n');
    const out = [];
    let inList = false;
    let inKv = false;
    let inTree = false;
    let firstHeadingUsed = false;

    const closeList = () => {
      if (inList) { out.push('</ul>'); inList = false; }
    };
    const closeKv = () => {
      if (inKv) { out.push('</dl>'); inKv = false; }
    };
    const closeTree = () => {
      if (inTree) { out.push('</ul>'); inTree = false; }
    };
    const closeAll = () => { closeList(); closeKv(); closeTree(); };

        const stripBullet = (line) => String(line || '').trim().replace(/^[•●▪◦・]\s*/, '');
    const isMarkdownSeparatorLine = (line) => {
      const s = stripBullet(line).replace(/^\|/, '').replace(/\|$/, '');
      if (!s.includes('|')) return false;
      const cols = s.split('|').map(x => x.trim()).filter(Boolean);
      return cols.length >= 2 && cols.every(c => /^:?-{3,}:?$/.test(c));
    };
    const parseCols = (line) => {
      const s = stripBullet(line);
      if (s.includes('|')) {
        const pipeCols = s.replace(/^\|/, '').replace(/\|$/, '').split('|').map(x => x.trim());
        if (pipeCols.filter(Boolean).length >= 3) return pipeCols;
      }
      return s.split(/\t+|[ \u00A0]{2,}|　+/).map(x=>x.trim()).filter(Boolean);
    };
    const isTableRow = (line) => !isMarkdownSeparatorLine(line) && parseCols(line).length >= 3;
    const isLikelyTableHeader = (line) => {
      if (isMarkdownSeparatorLine(line)) return false;
      const cols = parseCols(line);
      return cols.length >= 3 && (/項目/.test(cols[0]) || /対象/.test(cols[0]));
    };

    const peekNextNonEmpty = (arr, from) => {
      for (let k = from; k < arr.length; k++) {
        const s = (arr[k] || '').trim();
        if (s) return s;
      }
      return '';
    };

    const isLaborHeader = (line) => /^項目(?:\s|\t|　)+(?:アーケイ=イラー圏)(?:\s|\t|　)+(?:セラン都市圏)(?:\s|\t|　)+(?:ハヴァレイキ都市圏)$/.test(line);
    const isLaborRow = (line) => {
      const cols = line.split(/\t+| {2,}|　+/).map(x=>x.trim()).filter(Boolean);
      return cols.length >= 4 && /K$/.test(cols[1]) && /K$/.test(cols[2]) && /K$/.test(cols[3]);
    };

    const isFlowLine = (line) => /[↑↓←→]/.test(line) || /^[^\s]{0,14}〈[^〉]+〉/.test(line);

    for (let i = 0; i < lines.length; i++) {
      const raw = lines[i];
      const line = raw.trim();
      if (!line) { closeAll(); continue; }

      if (/^【.+】$/.test(line)) {
        closeAll();
        const h = line.slice(1, -1);
        if (!firstHeadingUsed && opt.skipHeading && h === opt.skipHeading) {
          firstHeadingUsed = true;
          continue;
        }
        firstHeadingUsed = true;
        out.push(`<h3>${esc(h)}</h3>`);
        continue;
      }

      if (/^〈.+〉$/.test(line)) {
        closeAll();
        out.push(`<h4>${esc(line.slice(1, -1))}</h4>`);
        continue;
      }

      if (/^\d+\.\s+/.test(line) && !isTableRow(line)) {
        closeAll();
        out.push(`<h4>${esc(line)}</h4>`);
        continue;
      }

      if (/^[■◆]/.test(line)) {
        closeAll();
        out.push(`<h4>${esc(line.replace(/^[■◆]\s*/, ''))}</h4>`);
        continue;
      }

      if (/^[^：；]{1,36}[：；]$/.test(line)) {
        closeAll();
        out.push(`<h4>${esc(line.replace(/[：；]$/, ''))}</h4>`);
        continue;
      }

      const prevBlank = i === 0 || !(lines[i - 1] || '').trim();
      const nextNonEmpty = peekNextNonEmpty(lines, i + 1);
      const plainHeadingLike = /^[^\s：；。．,，、]{1,18}$/.test(line);
      if (
        prevBlank &&
        !/^\d/.test(line) &&
        !/[：；]/.test(line) &&
        !/^[・\-■◆]/.test(line) &&
        !/[\.!?！？。、]$/.test(line) &&
        (plainHeadingLike || line.length <= 18) &&
        nextNonEmpty &&
        !isTableRow(nextNonEmpty)
      ) {
        closeAll();
        out.push(`<h4>${esc(line)}</h4>`);
        continue;
      }

      if (isFlowLine(line)) {
        closeAll();
        const flow = [];
        while (i < lines.length) {
          const l = lines[i].trim();
          if (!l) break;
          if (!isFlowLine(l) && !/[↑↓←→]/.test(l)) break;
          flow.push(l);
          i++;
        }
        i--;
        out.push(`<pre class="flow">${esc(flow.join('\n'))}</pre>`);
        continue;
      }

      if (isLaborHeader(line)) {
        closeAll();
        const rows = [];
        while (i < lines.length) {
          const cur = (lines[i] || '').trim();
          if (!cur) { i++; continue; }
          if (rows.length === 0 && isLaborHeader(cur)) {
            rows.push(cur.split(/\t+| {2,}|　+/).map(x=>x.trim()).filter(Boolean));
            i++;
            continue;
          }
          if (rows.length > 0 && isLaborRow(cur)) {
            rows.push(cur.split(/\t+| {2,}|　+/).map(x=>x.trim()).filter(Boolean).slice(0,4));
            i++;
            continue;
          }
          break;
        }
        i--;
        if (rows.length >= 2) {
          const head = rows[0].slice(0,4);
          const body = rows.slice(1);
          out.push('<div class="tbl-wrap"><table><thead><tr>' + head.map(c => `<th>${esc(c)}</th>`).join('') + '</tr></thead><tbody>');
          for (const r of body) out.push('<tr>' + r.slice(0,4).map(c => `<td>${esc(c)}</td>`).join('') + '</tr>');
          out.push('</tbody></table></div>');
          continue;
        }
      }
      if (isLikelyTableHeader(line) || isTableRow(line)) {
        closeAll();
        const rows = [];
        const firstCols = parseCols(line);
        const expectCols = Math.max(3, firstCols.length);
        while (i < lines.length) {
          const cur = (lines[i] || "").trim();
          if (!cur) { i++; continue; }
          if (/^【.+】$/.test(cur) || /^〈.+〉$/.test(cur) || /^[■◆]/.test(cur) || (/^\d+\.\s+/.test(cur) && !isTableRow(cur))) break;
          if (/^[^：；]{1,36}[：；]$/.test(cur)) break;
          if (isMarkdownSeparatorLine(cur)) { i++; continue; }
          if (!isTableRow(cur, expectCols) && rows.length > 0) break;
          if (!isLikelyTableHeader(cur) && !isTableRow(cur, expectCols)) break;
          rows.push(parseCols(cur));
          i++;
        }
        i--;
        const normalizedRows = normalizeTableRows(rows);
        if (normalizedRows.length >= 2) {
          const head = normalizedRows[0];
          const body = normalizedRows.slice(1).filter(r => r.some(Boolean));
          out.push('<div class="tbl-wrap"><table><thead><tr>' + head.map(c => `<th>${esc(c)}</th>`).join('') + '</tr></thead><tbody>');
          for (const r of body) out.push('<tr>' + r.map(c => `<td>${esc(c)}</td>`).join('') + '</tr>');
          out.push('</tbody></table></div>');
          continue;
        }
        // 行が足りなければ通常テキストとしてフォールバック
      }

      const indent = (raw.match(/^[ 　\t]+/) || [''])[0];
      const depth = indent.replace(/\t/g, '  ').length;
      if (depth > 0 || /^→/.test(line)) {
        closeList(); closeKv();
        if (!inTree) { out.push('<ul class="tree">'); inTree = true; }
        const txt = line.replace(/^→\s*/, '').replace(/^　*→\s*/, '');
        const pad = Math.min(48, Math.max(0, depth * 0.35 + (line.startsWith('→') ? 8 : 0)));
        out.push(`<li style="padding-left:${pad}px">${esc(txt)}</li>`);
        continue;
      }

      if (/^[・\-]/.test(line)) {
        closeTree(); closeKv();
        if (!inList) { out.push('<ul>'); inList = true; }
        out.push(`<li>${esc(line.replace(/^[・\-]\s*/, ''))}</li>`);
        continue;
      }

      const kv = line.match(/^(?:・\s*)?([^：]{1,48})：\s*(.+)$/);
      if (kv) {
        closeList(); closeTree();
        if (!inKv) { out.push('<dl class="kv">'); inKv = true; }
        out.push(`<dt>${esc(kv[1])}</dt><dd>${esc(kv[2])}</dd>`);
        continue;
      }

      closeAll();
      if (!out.length || /<h[34]>/.test(out[out.length - 1])) {
        out.push(`<p class="lead">${esc(line)}</p>`);
      } else {
        out.push(`<p>${esc(line)}</p>`);
      }
    }

    closeAll();
    return out.join('');
  }

  async function showSource(src, btn){
    [...switcher.querySelectorAll('button')].forEach(x=>x.classList.remove('active'));
    btn.classList.add('active');
    docTitle.textContent = `${src.label}（読み込み中）`;
    docBody.innerHTML = '<p>読み込み中...</p>';

    try {
      const res = await fetch(src.txt, { cache:'no-store' });
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const txt = await res.text();

      const first = (txt || '').split(/\r?\n/).find(x => x.trim()) || src.label;
      const m = first.match(/^【(.+?)】/);
      docTitle.textContent = m ? m[1] : src.label;

      docBody.innerHTML = toHtmlFromTxt(txt, { skipHeading: docTitle.textContent });
    } catch (e) {
      docTitle.textContent = src.label;
      docBody.innerHTML = `<p>読み込み失敗: ${esc(e.message)}</p>`;
    }
  }

  for (const src of SOURCES){
    const b = document.createElement('button');
    b.type = 'button';
    b.textContent = src.label;
    b.addEventListener('click', ()=>showSource(src, b));
    switcher.appendChild(b);
  }

  if (switcher.firstElementChild) switcher.firstElementChild.click();
  </script>
