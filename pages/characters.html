  <style>
    :root {
      --bg: #f7f5ef;
      --card: #ffffff;
      --ink: #1a1a1a;
      --muted: #635e54;
      --line: #ddd4c6;
      --accent: #7b1f2b;
      --accent-soft: #f8ecef;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      color: var(--ink);
      background: linear-gradient(155deg, #f5efe2, #f8f6f0);
      font-family: "BIZ UDPGothic", "Yu Gothic UI", sans-serif;
    }
    header {
      position: sticky;
      top: 0;
      z-index: 10;
      background: rgba(255,255,255,.92);
      backdrop-filter: blur(4px);
      border-bottom: 1px solid var(--line);
      padding: 14px clamp(14px, 4vw, 28px);
    }
    h1 { margin: 0 0 8px; font-size: 1.22rem; }
    nav a { color: #16566d; margin-right: 12px; text-decoration: none; border-bottom: 1px dotted currentColor; }
    .tools {
      display: grid;
      grid-template-columns: 1fr 200px;
      gap: 10px;
      margin-top: 10px;
    }
    input, select {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 9px 10px;
      font: inherit;
      background: #fff;
    }
    main {
      width: min(1200px, 96vw);
      margin: 18px auto 42px;
      display: grid;
      gap: 12px;
    }
    .card {
      border: 1px solid var(--line);
      border-radius: 14px;
      background: var(--card);
      overflow: hidden;
      box-shadow: 0 8px 24px rgba(28, 24, 18, .06);
    }
    .head {
      padding: 14px 16px;
      background: var(--accent-soft);
      border-bottom: 1px solid var(--line);
    }
    .name { margin: 0 0 6px; font-size: 1.1rem; color: var(--accent); }
    .copy { margin: 0; color: var(--muted); }
    .body {
      padding: 14px 16px;
      display: grid;
      gap: 10px;
      line-height: 1.8;
    }
    .label { font-weight: 700; }
    .quote {
      margin: 0;
      border-left: 4px solid #c9b8a0;
      padding: 6px 10px;
      background: #faf7f1;
      white-space: pre-wrap;
    }
    .chips { display: flex; flex-wrap: wrap; gap: 6px; }
    .chip {
      padding: 4px 8px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: #fff;
      font-size: .88rem;
    }
    a.chip {
      color: inherit;
      text-decoration: none;
    }
    a.chip:hover {
      background: #f5efe2;
    }
    .dim { color: var(--muted); }
  </style>
  <link rel="icon" type="image/png" href="../assets/images/アイコン.png" />
</head>
<body>
  <header>
    <h1>『共和国物語』サーガ 登場人物辞典</h1>
    <nav>
      <a href="../index.html">本編</a>
      <a href="characters.html">登場人物辞典</a>
      <a href="glossary.html">用語辞典</a>
      <a href="audiocommentary.html">オーディオコメンタリ</a>
    </nav>
    <div class="tools">
      <input id="q" type="search" placeholder="名前・肩書き・本文で検索" />
      <select id="sort">
        <option value="story">本編順</option>
        <option value="name">名前順</option>
      </select>
    </div>
  </header>
  <main id="list"></main>

  <script>
    const elList = document.getElementById("list");
    const elQ = document.getElementById("q");
    const elSort = document.getElementById("sort");

    const esc = (s) => String(s ?? "").replace(/[&<>\"]/g, (ch) => ({ "&":"&amp;", "<":"&lt;", ">":"&gt;", "\"":"&quot;" }[ch]));
    const asArray = (v) => Array.isArray(v) ? v : (v ? [v] : []);

    let rows = [];
    let charSlugByName = new Map();

    function normalizeKey(v) {
      return String(v ?? "").trim();
    }

    function resolveCharacterSlug(name) {
      const key = normalizeKey(name);
      return key ? (charSlugByName.get(key) || null) : null;
    }

    function matchText(row, q) {
      if (!q) return true;
      const hay = [
        row.ref.canonical,
        row.entry?.["キャッチフレーズ"],
        row.entry?.["台詞"],
        row.entry?.["肩書き"],
        row.entry?.["本文"],
        row.entry?.["戦闘スタイル"],
        row.entry?.["コメント"],
        asArray(row.entry?.["関連人物"]).join(" ")
      ].join("\n").toLowerCase();
      return hay.includes(q.toLowerCase());
    }

    function render() {
      const q = elQ.value.trim();
      let view = rows.filter(r => matchText(r, q));

      if (elSort.value === "name") {
        view = [...view].sort((a, b) => a.ref.canonical.localeCompare(b.ref.canonical, "ja"));
      }

      if (view.length === 0) {
        elList.innerHTML = '<p class="dim">該当する人物がありません。</p>';
        return;
      }

      elList.innerHTML = view.map((row) => {
        const e = row.entry || {};
        const title = e["人名（見出し）"] || row.ref.canonical;
        const catchCopy = e["キャッチフレーズ"] || "（未入力）";
        const related = asArray(e["関連人物"]);
        const relatedHtml = related.map((x) => {
          const slug = resolveCharacterSlug(x);
          if (!slug) return `<span class="chip">${esc(x)}</span>`;
          return `<a class="chip" href="#${encodeURIComponent(slug)}">${esc(x)}</a>`;
        }).join("");

        return `
          <section class="card" id="${esc(row.ref.slug)}">
            <div class="head">
              <h2 class="name">${esc(title)}</h2>
              <p class="copy">${esc(catchCopy)}</p>
            </div>
            <div class="body">
              <div><span class="label">肩書き:</span> ${esc(e["肩書き"] || "（未入力）")}</div>
              <div><span class="label">本文:</span> ${esc(e["本文"] || "（未入力）")}</div>
              <div><span class="label">戦闘スタイル:</span> ${esc(e["戦闘スタイル"] || "（未入力）")}</div>
              <div><span class="label">台詞:</span></div>
              <blockquote class="quote">${esc(e["台詞"] || "（未入力）")}</blockquote>
              <div><span class="label">コメント:</span> ${esc(e["コメント"] || "（未入力）")}</div>
              <div>
                <span class="label">関連人物:</span>
                ${related.length ? `<div class="chips">${relatedHtml}</div>` : "（未入力）"}
              </div>
            </div>
          </section>
        `;
      }).join("\n");
    }

    function jumpToHash() {
      const raw = (location.hash || "").replace(/^#/, "");
      if (!raw) return;
      const id = decodeURIComponent(raw);
      const target = document.getElementById(id);
      if (target) target.scrollIntoView({ block: "start" });
    }

    async function boot() {
      try {
        const [storyRes, dicRes] = await Promise.all([
          fetch("../data/物語本編.json", { cache: "no-store" }),
          fetch("../data/rpdic.json", { cache: "no-store" })
        ]);
        if (!storyRes.ok) throw new Error(`物語本編.json: HTTP ${storyRes.status}`);
        if (!dicRes.ok) throw new Error(`rpdic.json: HTTP ${dicRes.status}`);

        const story = await storyRes.json();
        const dic = await dicRes.json();

        const refs = (story.references && Array.isArray(story.references.characters))
          ? story.references.characters
          : [];

        charSlugByName = new Map();
        for (const ref of refs) {
          const slug = ref.slug;
          for (const name of [ref.canonical, ...(ref.aliases || [])]) {
            const key = normalizeKey(name);
            if (key && slug && !charSlugByName.has(key)) {
              charSlugByName.set(key, slug);
            }
          }
        }

        const map = new Map();
        for (const c of (dic.characters || [])) {
          if (c.id) map.set(c.id, c);
          if (c["人名（見出し）"]) map.set(c["人名（見出し）"], c);
        }

        rows = refs.map(ref => ({
          ref,
          entry: map.get(ref.slug) || map.get(ref.canonical) || null
        }));

        render();
        jumpToHash();
      } catch (e) {
        elList.innerHTML = `<p class="dim">読み込み失敗: ${esc(e.message)}</p>`;
      }
    }

    elQ.addEventListener("input", render);
    elSort.addEventListener("change", render);

    window.addEventListener('hashchange', () => setTimeout(jumpToHash, 0));
    boot();
  </script>
</body>
</html>
