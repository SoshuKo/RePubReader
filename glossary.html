  <style>
    :root {
      --bg: #f2f6f7;
      --paper: #ffffff;
      --ink: #182024;
      --muted: #5f6c72;
      --line: #cad5da;
      --knife: #8b1d1d;
      --stance: #1f5f79;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      color: var(--ink);
      background: radial-gradient(circle at 10% -20%, #d8ecf2, transparent 45%), var(--bg);
      font-family: "BIZ UDPGothic", "Yu Gothic UI", sans-serif;
    }
    header {
      padding: 16px clamp(14px, 4vw, 28px);
      border-bottom: 1px solid var(--line);
      background: rgba(255,255,255,.9);
      position: sticky;
      top: 0;
      backdrop-filter: blur(4px);
      z-index: 10;
    }
    h1 { margin: 0 0 8px; font-size: 1.2rem; }
    nav a { color: #155a70; margin-right: 12px; text-decoration: none; border-bottom: 1px dotted currentColor; }
    .lang-switch { margin: 6px 0 4px; font-size: .95rem; }
    .lang-switch a { color: #155a70; text-decoration: none; border-bottom: 1px dotted currentColor; margin-right: 10px; }
    .lang-switch a[aria-current="page"] { font-weight: 700; color: #8b1d1d; border-bottom-style: solid; }
    .tools {
      margin-top: 10px;
      display: grid;
      grid-template-columns: 1fr 180px;
      gap: 10px;
    }
    input, select {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 9px 10px;
      font: inherit;
      background: #fff;
    }
    main {
      width: min(1200px, 96vw);
      margin: 18px auto 40px;
      display: grid;
      gap: 16px;
    }
    .section-title {
      margin: 4px 0;
      font-size: 1.1rem;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 12px;
    }
    .card {
      scroll-margin-top: 96px;
      border: 1px solid var(--line);
      border-radius: 14px;
      overflow: hidden;
      background: var(--paper);
      box-shadow: 0 8px 20px rgba(13, 36, 46, .07);
    }
    .head {
      padding: 10px 12px;
      border-bottom: 1px solid var(--line);
      background: #f8fbfc;
    }
    .head.knife { border-left: 5px solid var(--knife); }
    .head.stance { border-left: 5px solid var(--stance); }
    .title { margin: 0 0 4px; font-size: 1rem; }
    .catch { margin: 0; color: var(--muted); font-size: .9rem; }
    .body { padding: 10px 12px; line-height: 1.75; }
    .entry-art-wrap {
      margin: 10px 0 0;
      width: min(220px, 42vw);
      border: 0;
      border-radius: 10px;
      overflow: hidden;
      background: transparent;
    }
    .entry-art-wrap.empty { display: none; }
    .entry-art {
      width: 100%;
      height: 110px;
      display: block;
      object-fit: contain;
      filter: drop-shadow(0 2px 6px rgba(0,0,0,.18));
      background: transparent;
    }
    .label { font-weight: 700; }
    .char-links { display: inline-flex; flex-wrap: wrap; gap: 6px; vertical-align: middle; }
    .char-link {
      padding: 2px 7px;
      border: 1px solid var(--line);
      border-radius: 999px;
      text-decoration: none;
      color: #155a70;
      background: #fff;
      font-size: .9em;
    }
    .char-link:hover { background: #edf5f8; }
    .dim { color: var(--muted); }
  </style>

<body>
  <header>
    <h1>『共和国物語』サーガ 用語辞典</h1>
    <nav>
      <a href="./index.html">本編</a>
      <a href="characters.html">登場人物辞典</a>
      <a href="glossary.html">用語辞典</a>
      <a href="audiocommentary.html">オーディオコメンタリ</a>
      <a href="diary.html">執筆録</a>
    
      <a href="./地理/geo.html">世界設定</a>
      <a href="./観光/visit.html">外務省観光局</a>
    </nav>
    <div class="lang-switch"><a id="langLinkJa" href="./glossary.html">日本語</a><a id="langLinkEn" href="./glossary.html?lang=en">English</a></div>
    <div class="tools">
      <input id="q" type="search" placeholder="名称・本文・使用者・コメントで検索" />
      <select id="kind">
        <option value="all">すべて</option>
        <option value="term">用語</option>
        <option value="knife">ナイフ</option>
        <option value="stance">構え</option>
      </select>
    </div>
  </header>

  <main>
    <section>
      <h2 class="section-title">用語</h2>
      <div id="termList" class="grid"></div>
    </section>
    <section>
      <h2 class="section-title">ナイフ</h2>
      <div id="knifeList" class="grid"></div>
    </section>
    <section>
      <h2 class="section-title">構え</h2>
      <div id="stanceList" class="grid"></div>
    </section>
  </main>

  <script>
    const esc = (s) => String(s ?? "").replace(/[&<>\"]/g, (ch) => ({ "&":"&amp;", "<":"&lt;", ">":"&gt;", "\"":"&quot;" }[ch]));
    const asArray = (v) => Array.isArray(v) ? v : (v ? [v] : []);

    const termList = document.getElementById("termList");
    const knifeList = document.getElementById("knifeList");
    const stanceList = document.getElementById("stanceList");
    const qEl = document.getElementById("q");
    const kindEl = document.getElementById("kind");

    let terms = [];
    let knives = [];
    let stances = [];
    let charSlugByName = new Map();
    let imageNameById = new Map();
    const pageLang = (new URLSearchParams(location.search).get("lang") === "en") ? "en" : "ja";
    document.documentElement.setAttribute("lang", pageLang);
    const ui = pageLang === "en" ? {
      title: "Republica Saga Glossary",
      h1: "Republica Saga Glossary",
      navMain: "Story",
      navChars: "Character Dictionary",
      navGloss: "Glossary",
      navAudio: "Audio Commentary",
      navDiary: "Writing Log",
      navWorld: "World",
      navTour: "Tourism",
      search: "Search by term / body / users",
      kindAll: "All",
      kindTerm: "Terms",
      kindKnife: "Knives",
      kindStance: "Stances",
      secTerm: "Terms",
      secKnife: "Knives",
      secStance: "Stances",
      uncategorized: "Uncategorized",
      labels: { body: "Body", users: "Users", comment: "Comment" },
      empty: "(not set)",
      noHit: "No match",
      hidden: "Hidden",
      loadingErr: "Failed to load: "
    } : {
      title: "用語辞典 | 『共和国物語』サーガ",
      h1: "『共和国物語』サーガ 用語辞典",
      navMain: "本編",
      navChars: "登場人物辞典",
      navGloss: "用語辞典",
      navAudio: "オーディオコメンタリ",
      navDiary: "執筆録",
      navWorld: "世界設定",
      navTour: "外務省観光局",
      search: "名称・本文・使用者・コメントで検索",
      kindAll: "すべて",
      kindTerm: "用語",
      kindKnife: "ナイフ",
      kindStance: "構え",
      secTerm: "用語",
      secKnife: "ナイフ",
      secStance: "構え",
      uncategorized: "未分類",
      labels: { body: "本文", users: "使用者", comment: "コメント" },
      empty: "（未入力）",
      noHit: "該当なし",
      hidden: "非表示",
      loadingErr: "読み込み失敗: "
    };

    document.title = ui.title;
    const h1 = document.querySelector("header h1"); if (h1) h1.textContent = ui.h1;
    const navLinks = document.querySelectorAll("header nav a");
    if (navLinks.length >= 7) {
      navLinks[0].textContent = ui.navMain;
      navLinks[0].href = pageLang === "en" ? "./index.html?lang=en" : "./index.html";
      navLinks[1].textContent = ui.navChars;
      navLinks[1].href = pageLang === "en" ? "characters.html?lang=en" : "characters.html";
      navLinks[2].textContent = ui.navGloss;
      navLinks[2].href = pageLang === "en" ? "glossary.html?lang=en" : "glossary.html";
      navLinks[3].textContent = ui.navAudio;
      navLinks[4].textContent = ui.navDiary;
      navLinks[5].textContent = ui.navWorld;
      navLinks[6].textContent = ui.navTour;
    }
    if (qEl) qEl.placeholder = ui.search;
    const langLinkJa = document.getElementById("langLinkJa");
    const langLinkEn = document.getElementById("langLinkEn");
    if (langLinkJa) langLinkJa.setAttribute("aria-current", pageLang === "ja" ? "page" : "false");
    if (langLinkEn) langLinkEn.setAttribute("aria-current", pageLang === "en" ? "page" : "false");
    if (kindEl && kindEl.options.length >= 4) {
      kindEl.options[0].textContent = ui.kindAll;
      kindEl.options[1].textContent = ui.kindTerm;
      kindEl.options[2].textContent = ui.kindKnife;
      kindEl.options[3].textContent = ui.kindStance;
    }
    const secTitles = document.querySelectorAll(".section-title");
    if (secTitles.length >= 3) {
      secTitles[0].textContent = ui.secTerm;
      secTitles[1].textContent = ui.secKnife;
      secTitles[2].textContent = ui.secStance;
    }

    function normalizeKey(v) {
      return String(v ?? "").trim();
    }

    function resolveCharacterSlug(name) {
      const key = normalizeKey(name);
      return key ? (charSlugByName.get(key) || null) : null;
    }

    function cleanImageName(v) {
      return String(v ?? "").replace(/[（(].*?[）)]/g, "").trim();
    }

    function renderEntryImage(nameOrNames, alt) {
      const names = Array.isArray(nameOrNames) ? nameOrNames : [nameOrNames];
      const uniq = [];
      const seen = new Set();
      for (const n of names) {
        for (const cand of [normalizeKey(n), normalizeKey(cleanImageName(n))]) {
          if (!cand || seen.has(cand)) continue;
          seen.add(cand);
          uniq.push(cand);
        }
      }
      if (!uniq.length) return "";

      const srcList = [];
      for (const key of uniq) {
        const enc = encodeURIComponent(key);
        srcList.push('./assets/images/' + enc + '.png');
        srcList.push('./assets/images/' + enc + '.PNG');
      }
      const srcs = srcList.join('|');
      return `<div class="entry-art-wrap"><img class="entry-art" src="${esc(srcList[0])}" alt="${esc(alt || uniq[0])}" loading="lazy" decoding="async" fetchpriority="low" data-srcs="${esc(srcs)}" data-idx="0" onerror="(function(img){var list=(img.dataset.srcs||'').split('|');var idx=Number(img.dataset.idx||0)+1;if(idx<list.length){img.dataset.idx=String(idx);img.src=list[idx];}else{img.style.display='none';if(img.parentElement){img.parentElement.className='entry-art-wrap empty';}}})(this)"></div>`;
    }

    function normalizeByStory(dicArr, storyRefs, mode) {
      const K = {
        KNIFE_TITLE: "ナイフ名（見出し）",
        STANCE_TITLE: "構え名（見出し）",
        CATCH: "キャッチフレーズ",
        BODY: "本文",
        USERS: "使用者",
        COMMENT: "コメント"
      };

      const list = asArray(dicArr);
      const nameKey = mode === "knife" ? K.KNIFE_TITLE : K.STANCE_TITLE;

      const ensureId = (it, i) => ({
        ...it,
        id: it.id || normalizeKey(it[nameKey]) || `${mode}-${i + 1}`
      });

      if (!Array.isArray(storyRefs) || storyRefs.length === 0) {
        return list.map(ensureId);
      }

      const byId = new Map();
      const byName = new Map();
      for (let i = 0; i < list.length; i++) {
        const it = ensureId(list[i], i);
        if (it.id) byId.set(normalizeKey(it.id), it);
        if (it[nameKey]) byName.set(normalizeKey(it[nameKey]), it);
      }

      return storyRefs.map((ref) => {
        const byRef = byId.get(normalizeKey(ref.slug)) || byName.get(normalizeKey(ref.canonical));
        if (byRef) return byRef;
        return {
          id: ref.slug || normalizeKey(ref.canonical),
          [nameKey]: ref.canonical,
          [K.CATCH]: "",
          [K.BODY]: "",
          [K.USERS]: [],
          [K.COMMENT]: ""
        };
      });
    }

    function matchRefsByDic(allRefs, dicArr, mode) {
      const K = {
        KNIFE_TITLE: "ナイフ名（見出し）",
        STANCE_TITLE: "構え名（見出し）"
      };
      const nameKey = mode === "knife" ? K.KNIFE_TITLE : K.STANCE_TITLE;
      const idSet = new Set(asArray(dicArr).map((it) => normalizeKey(it.id)).filter(Boolean));
      const nameSet = new Set(asArray(dicArr).map((it) => normalizeKey(it[nameKey])).filter(Boolean));
      return asArray(allRefs).filter((r) => {
        const slug = normalizeKey(r.slug);
        const canonical = normalizeKey(r.canonical);
        return idSet.has(slug) || nameSet.has(canonical);
      });
    }

    function normalizeTermsByStory(dicGlossary, storyRefs) {
      const refSlugByCanonical = new Map();
      for (const ref of asArray(storyRefs)) {
        const canonical = normalizeKey(ref.canonical);
        if (canonical && ref.slug && !refSlugByCanonical.has(canonical)) {
          refSlugByCanonical.set(canonical, ref.slug);
        }
      }

      const out = [];
      const seen = new Set();

      const pushTerm = (titleRaw, bodyRaw, categoryRaw) => {
        const title = String(titleRaw || "").trim();
        if (!title) return;
        const body = String(bodyRaw || "").trim();
        const category = String(categoryRaw || ui.uncategorized).trim() || ui.uncategorized;
        const slug = refSlugByCanonical.get(title) || title;
        const key = normalizeKey(slug);
        if (seen.has(key)) return;
        seen.add(key);
        out.push({ id: slug, title, body, category });
      };

      for (const item of asArray(dicGlossary)) {
        const hasNested = Array.isArray(item["用語"]) || Array.isArray(item.terms);
        if (hasNested) {
          const category = item["カテゴリ"] || item.category || ui.uncategorized;
          for (const term of asArray(item["用語"] || item.terms)) {
            pushTerm(term["タイトル"] || term.title || term.name, term["本文"] || term.body, category);
          }
        } else {
          pushTerm(
            item["タイトル"] || item["用語名（見出し）"] || item.title || item.name,
            item["本文"] || item.body,
            item["カテゴリ"] || item.category
          );
        }
      }

      for (const ref of asArray(storyRefs)) {
        const title = String(ref.canonical || "").trim();
        const slug = String(ref.slug || "").trim();
        if (!title || !slug) continue;
        const key = normalizeKey(slug);
        if (seen.has(key)) continue;
        seen.add(key);
        out.push({ id: slug, title, body: "", category: ui.uncategorized });
      }

      return out;
    }

    function filterItem(it, mode, q) {
      if (mode === "term") {
        const txt = [it.title, it.body, it.category].join("\n").toLowerCase();
        return txt.includes(q.toLowerCase());
      }
      const nameKey = mode === "knife" ? "ナイフ名（見出し）" : "構え名（見出し）";
      const txt = [
        it[nameKey],
        it["キャッチフレーズ"],
        it["本文"],
        asArray(it["使用者"]).join(" "),
        it["コメント"]
      ].join("\n").toLowerCase();
      return txt.includes(q.toLowerCase());
    }

    function renderUsers(users) {
      const items = asArray(users);
      if (!items.length) return ui.empty;
      const html = items.map((name) => {
        const slug = resolveCharacterSlug(name);
        if (!slug) return `<span>${esc(name)}</span>`;
        return `<a class="char-link" href="characters.html${pageLang === "en" ? "?lang=en" : ""}#${encodeURIComponent(slug)}">${esc(name)}</a>`;
      }).join("");
      return `<span class="char-links">${html}</span>`;
    }

    function termCard(it) {
      return `
        <article class="card" id="${esc(it.id || it.title || "")}" data-name="${esc(it.title || "")}">
          <div class="head">
            <h3 class="title">${esc(it.title || ui.empty)}</h3>
            <p class="catch">${esc(it.category || ui.uncategorized)}</p>
          </div>
          <div class="body">
            <div><span class="label">${esc(ui.labels.body)}:</span> ${esc(it.body || ui.empty)}</div>
          </div>
        </article>
      `;
    }


    function selectGlossaryImageName(item, mode, nameKey) {
      if (!item) return [];
      const out = [];
      const push = (v) => {
        if (v !== undefined && v !== null && String(v).trim() !== "") out.push(String(v));
      };
      push(item.id);
      push(imageNameById.get(item.id));
      push(item[nameKey]);
      push(cleanImageName(item[nameKey]));
      return out;
    }
    function card(it, mode) {
      const nameKey = mode === "knife" ? "ナイフ名（見出し）" : "構え名（見出し）";
      return `
        <article class="card" id="${esc(it.id || it[nameKey] || "")}" data-name="${esc(it[nameKey] || "")}">
          <div class="head ${mode}">
            <h3 class="title">${esc(it[nameKey] || ui.empty)}</h3>
            <p class="catch">${esc(it["キャッチフレーズ"] || it.catch || it.tagline || ui.empty)}</p>
          </div>
          <div class="body">
            ${mode === "knife" ? renderEntryImage(selectGlossaryImageName(it, mode, nameKey), `${it[nameKey] || "Knife"} illustration`) : ""}
            <div><span class="label">${esc(ui.labels.body)}:</span> ${esc(it["本文"] || it.body || ui.empty)}</div>
            <div><span class="label">${esc(ui.labels.users)}:</span> ${renderUsers(it["使用者"] || it.users)}</div>
            <div><span class="label">${esc(ui.labels.comment)}:</span> ${esc(it["コメント"] || it.comment || ui.empty)}</div>
          </div>
        </article>
      `;
    }

    function render() {
      const q = qEl.value.trim();
      const kind = kindEl.value;

      const t = terms.filter(it => !q || filterItem(it, "term", q));
      const k = knives.filter(it => !q || filterItem(it, "knife", q));
      const s = stances.filter(it => !q || filterItem(it, "stance", q));

      termList.innerHTML = (kind === "all" || kind === "term")
        ? (t.length ? t.map(termCard).join("\n") : '<p class="dim">該当なし</p>')
        : '<p class="dim">非表示</p>';

      knifeList.innerHTML = (kind === "all" || kind === "knife")
        ? (k.length ? k.map(it => card(it, "knife")).join("\n") : '<p class="dim">該当なし</p>')
        : '<p class="dim">非表示</p>';

      stanceList.innerHTML = (kind === "all" || kind === "stance")
        ? (s.length ? s.map(it => card(it, "stance")).join("\n") : '<p class="dim">該当なし</p>')
        : '<p class="dim">非表示</p>';
    }

    function jumpToHash() {
      const raw = (location.hash || "").replace(/^#/, "");
      if (!raw) return;
      const id = decodeURIComponent(raw);
      const target = document.getElementById(id);
      if (target) target.scrollIntoView({ block: "start" });
    }

    async function boot() {
      try {
        function loadJsonByXhr(url) {
          try {
            const xhr = new XMLHttpRequest();
            xhr.open("GET", url, false);
            xhr.send(null);
            if (xhr.status === 200 || xhr.status === 0) {
              return JSON.parse(xhr.responseText);
            }
          } catch (_) {}
          return null;
        }

        async function fetchJson(primary, fallback = null) {
          try {
            const res = await fetch(primary, { cache: "no-store" });
            if (res.ok) return await res.json();
          } catch (_) {}

          const byXhr = loadJsonByXhr(primary);
          if (byXhr) return byXhr;

          if (fallback) {
            try {
              const res2 = await fetch(fallback, { cache: "no-store" });
              if (res2.ok) return await res2.json();
            } catch (_) {}

            const byXhr2 = loadJsonByXhr(fallback);
            if (byXhr2) return byXhr2;
          }
          throw new Error(`load failed: ${primary}${location.protocol === "file:" ? " (open via local server: http://localhost)" : ""}`);
        }

        let story = null;
        try {
          story = await fetchJson(
            pageLang === "en" ? "./data/story_en.json" : "./data/物語本編.json",
            "./data/物語本編.json"
          );
        } catch (_) {}

        const dic = await fetchJson(
          pageLang === "en" ? "./data/rpdic_en.json" : "./data/rpdic.json",
          "./data/rpdic.json"
        );

        const charRefs = (story && story.references && Array.isArray(story.references.characters))
          ? story.references.characters
          : [];
        charSlugByName = new Map();
        for (const ref of charRefs) {
          const slug = ref.slug;
          for (const name of [ref.canonical, ...(ref.aliases || [])]) {
            const key = normalizeKey(name);
            if (key && slug && !charSlugByName.has(key)) {
              charSlugByName.set(key, slug);
            }
          }
        }



        imageNameById = new Map();
        if (pageLang === "en") {
          try {
            const dicJa = await fetchJson("./data/rpdic.json", null);
            for (const kja of ((dicJa.knives || []) || [])) {
              if (kja && kja.id && kja["ナイフ名（見出し）"]) {
                imageNameById.set(String(kja.id).trim(), kja["ナイフ名（見出し）"]);
              }
            }
            for (const sja of ((dicJa.stances || []) || [])) {
              if (sja && sja.id && sja["構え名（見出し）"]) {
                imageNameById.set(String(sja.id).trim(), sja["構え名（見出し）"]);
              }
            }
          } catch (_) {}
        }

        const allRefs = (story && story.references && Array.isArray(story.references.glossary)) ? story.references.glossary : [];
        const knifeSource = asArray(dic.knives || []);
        const stanceSource = asArray(dic.stances || []);

        const knifeRefs = matchRefsByDic(allRefs, knifeSource, "knife");
        const stanceRefs = matchRefsByDic(allRefs, stanceSource, "stance");
        const usedSlugs = new Set([...knifeRefs, ...stanceRefs].map((r) => normalizeKey(r.slug)).filter(Boolean));
        const termRefs = allRefs.filter((r) => !usedSlugs.has(normalizeKey(r.slug)));

        terms = normalizeTermsByStory((dic.glossary || dic.terms || []), termRefs);
        knives = normalizeByStory(knifeSource.map((it)=>({ ...it, ["ナイフ名（見出し）"]: it["ナイフ名（見出し）"] || it.title || it.name || "", ["キャッチフレーズ"]: it["キャッチフレーズ"] || it.catch || it.tagline || "", ["本文"]: it["本文"] || it.body || "", ["使用者"]: it["使用者"] || it.users || [], ["コメント"]: it["コメント"] || it.comment || "" })), knifeRefs, "knife");
        stances = normalizeByStory(stanceSource.map((it)=>({ ...it, ["構え名（見出し）"]: it["構え名（見出し）"] || it.title || it.name || "", ["キャッチフレーズ"]: it["キャッチフレーズ"] || it.catch || it.tagline || "", ["本文"]: it["本文"] || it.body || "", ["使用者"]: it["使用者"] || it.users || [], ["コメント"]: it["コメント"] || it.comment || "" })), stanceRefs, "stance");

        render();
        jumpToHash();
      } catch (e) {
        termList.innerHTML = `<p class="dim">${esc(ui.loadingErr)}${esc(e.message)}</p>`;
        knifeList.innerHTML = `<p class="dim">${esc(ui.loadingErr)}${esc(e.message)}</p>`;
        stanceList.innerHTML = "";
      }
    }

    qEl.addEventListener("input", render);
    kindEl.addEventListener("change", render);
    window.addEventListener('hashchange', () => setTimeout(jumpToHash, 0));
    boot();
  </script>
<script id="autoLangEnPatch">
(function(){
  const p = new URLSearchParams(location.search);
  if (p.get("lang") !== "en") return;
  document.querySelectorAll('a[href]').forEach(a => {
    if (a.closest('.lang-switch') || a.closest('.lang-buttons') || (a.id && (/^langLink/i.test(a.id) || /^lang-/i.test(a.id)))) return;
    const h = a.getAttribute("href");
    if (!h || h.startsWith("#") || h.startsWith("http://") || h.startsWith("https://") || h.startsWith("mailto:") || h.startsWith("tel:")) return;
    if (h.includes("lang=")) return;
    const i = h.indexOf("#");
    const base = i >= 0 ? h.slice(0, i) : h;
    const hash = i >= 0 ? h.slice(i) : "";
    const sep = base.includes("?") ? "&" : "?";
    a.setAttribute("href", base + sep + "lang=en" + hash);
  });
})();
</script>
